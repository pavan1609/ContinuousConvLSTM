dataset:
  sens_folder: data/wisdm_watch/10hz
  input_dim: 3
  sampling_rate: 10
  num_classes: 18
  window_size: 10
  window_overlap: 50
  tiou_thresholds:
  - 0.3
  - 0.4
  - 0.5
  - 0.6
  - 0.7
model:
  conv_kernels: 64
  conv_kernel_size: 3
  lstm_units: 128
  lstm_layers: 1
  dropout: 0.5
  conv_type: standard
  supported_sample_rates:
  - 5
  - 10
  - 20
  multirate_training: false
  temporal_head: lstm
  kernel_size: 3
train_cfg:
  lr: 0.0001
  lr_decay: 0.9
  lr_step: 10
  epochs: 30
  weight_decay: 1.0e-06
  weight_init: xavier_normal
  weighted_loss: true
  auto_resume: false
  log_subdir: deepconvlstm/wisdm_watch/10hz
loader:
  train_batch_size: 100
  test_batch_size: 1
